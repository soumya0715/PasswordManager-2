# -----------------------------
# Spring Application
# -----------------------------
spring.application.name=password-manager-backend
  
  # -----------------------------
  # Datasource
  # -----------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/password_manager_db
spring.datasource.username=root
spring.datasource.password=123456789
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
  
  # -----------------------------
  # JPA / Hibernate
  # -----------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
  
  # -----------------------------
  # Jackson
  # -----------------------------
spring.jackson.serialization.write-dates-as-timestamps=false
  
  # -----------------------------
  # Server
  # -----------------------------
server.port=8080
server.servlet.context-path=/api
  
  # -----------------------------
  # JWT
  # -----------------------------
jwt.secret=9fKxT2vLq8ZpW4nYcH7mR3uJdS6aB1eQxE5tGkV9wNzCjU2rFpM8yHdL6sQaT4vPx
jwt.expiration=86400000
  
  # -----------------------------
  # Logging
  # -----------------------------
logging.level.root=INFO
logging.level.com.passwordmanager=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n